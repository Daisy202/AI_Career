openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: AI Career Guidance API for pre-university students in Zimbabwe
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: careers
    description: Career data and recommendations
  - name: programs
    description: University programs and entry requirements
  - name: chat
    description: AI chatbot powered by Gemini
  - name: jobs
    description: Job market data
  - name: feedback
    description: User feedback
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new student account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid input or email taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logoutUser
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current logged-in user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /careers:
    get:
      operationId: getCareers
      tags: [careers]
      summary: Get all available careers
      responses:
        "200":
          description: List of careers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Career"

  /recommend:
    post:
      operationId: getRecommendations
      tags: [careers]
      summary: Get personalized career recommendations based on student profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentProfile"
      responses:
        "200":
          description: Career recommendations with matched programs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationsResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /careers/{careerId}:
    get:
      operationId: getCareerById
      tags: [careers]
      summary: Get detailed information about a specific career
      parameters:
        - name: careerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Career details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Career"
        "404":
          description: Career not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /programs:
    get:
      operationId: getPrograms
      tags: [programs]
      summary: Get all university programs
      parameters:
        - name: school
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of university programs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UniversityProgram"

    post:
      operationId: createProgram
      tags: [programs]
      summary: Create a new university program (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProgramRequest"
      responses:
        "201":
          description: Program created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UniversityProgram"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /programs/match:
    post:
      operationId: matchPrograms
      tags: [programs]
      summary: Find university programs matching student subjects and optional cut-off points
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgramMatchRequest"
      responses:
        "200":
          description: Matched programs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProgramMatch"

  /programs/upload:
    post:
      operationId: uploadPrograms
      tags: [programs]
      summary: Upload programs via JSON or CSV (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadProgramsRequest"
      responses:
        "200":
          description: Programs imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadProgramsResponse"
        "400":
          description: Invalid data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /programs/{programId}:
    patch:
      operationId: updateProgram
      tags: [programs]
      summary: Update a university program (admin only)
      parameters:
        - name: programId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProgramRequest"
      responses:
        "200":
          description: Program updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UniversityProgram"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteProgram
      tags: [programs]
      summary: Delete a university program (admin only)
      parameters:
        - name: programId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /insights:
    get:
      operationId: getCareerInsights
      tags: [jobs]
      summary: Get job market insights for a career
      parameters:
        - name: career
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job market insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareerInsights"

  /jobs:
    get:
      operationId: getJobs
      tags: [jobs]
      summary: Get job listings for a career
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobListing"

  /chat:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a message to the Gemini AI career advisor chatbot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "500":
          description: AI service error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback:
    post:
      operationId: submitFeedback
      tags: [feedback]
      summary: Submit feedback about career recommendations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackRequest"
      responses:
        "201":
          description: Feedback submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        school:
          type: ["string", "null"]
        level:
          type: ["string", "null"]
      required: [name, email, password]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserInfo"
        message:
          type: string
      required: [user, message]

    UserInfo:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, student]
        school:
          type: ["string", "null"]
        level:
          type: ["string", "null"]
      required: [id, name, email, role]

    Career:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        category:
          type: string
        requiredSkills:
          type: array
          items:
            type: string
        aLevelSubjects:
          type: array
          items:
            type: string
        universityPrograms:
          type: array
          items:
            type: string
        averageSalary:
          type: string
        jobOutlook:
          type: string
      required: [id, name, description, category, requiredSkills, aLevelSubjects, universityPrograms, averageSalary, jobOutlook]

    StudentProfile:
      type: object
      properties:
        interests:
          type: array
          items:
            type: string
        strengths:
          type: array
          items:
            type: string
        subjects:
          type: array
          items:
            type: string
          description: A-Level subjects the student has passed
        oLevelSubjects:
          type: array
          items:
            type: string
          description: O-Level subjects the student has passed
        personalityType:
          type: ["string", "null"]
        hobbies:
          type: array
          items:
            type: string
        cutOffPoints:
          type: ["integer", "null"]
          description: Student's ZIMSEC cut-off points (optional)
        oLevelPasses:
          type: ["integer", "null"]
          description: Number of O-Level passes (minimum 5 required for most programs)
        aLevelPasses:
          type: ["integer", "null"]
          description: Number of A-Level passes (minimum 2 required for most programs)
      required: [interests, strengths, subjects]

    AiRecommendedProgram:
      type: object
      properties:
        programName:
          type: string
        schoolName:
          type: string
      required: [programName, schoolName]
      description: Program AI recommended, verified against DB

    RecommendationsResponse:
      type: object
      properties:
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/CareerRecommendation"
        aiAdvice:
          type: string
          description: AI-generated personalized advice based on profile and DB programs
        aiRecommendedPrograms:
          type: array
          items:
            $ref: "#/components/schemas/AiRecommendedProgram"
          description: Programs AI recommended that exist in our database (cross-referenced)
      required: [recommendations]

    CareerRecommendation:
      type: object
      properties:
        career:
          $ref: "#/components/schemas/Career"
        matchPercentage:
          type: integer
        matchReasons:
          type: array
          items:
            type: string
        demandLevel:
          type: string
          enum: [High, Medium, Low]
        matchedPrograms:
          type: array
          items:
            $ref: "#/components/schemas/ProgramMatch"
          description: University programs the student qualifies for based on their subjects
      required: [career, matchPercentage, matchReasons, demandLevel, matchedPrograms]

    UniversityProgram:
      type: object
      properties:
        id:
          type: integer
        schoolName:
          type: string
        programName:
          type: string
        faculty:
          type: ["string", "null"]
        requiredSubjects:
          type: array
          items:
            type: string
          description: Required A-Level subjects
        minRequiredSubjects:
          type: ["integer", "null"]
          description: Minimum number of required subjects needed (e.g. 2 = at least 2 of the listed). Null = all required.
        minimumPoints:
          type: ["integer", "null"]
          description: Minimum ZIMSEC cut-off points required
        minOLevelPasses:
          type: ["integer", "null"]
          description: Minimum O-Level passes required (default 5)
        minALevelPasses:
          type: ["integer", "null"]
          description: Minimum A-Level passes required (default 2)
        duration:
          type: ["string", "null"]
          description: Duration of program e.g. 4 years
        description:
          type: ["string", "null"]
        careerCategory:
          type: ["string", "null"]
          description: Related career category
      required: [id, schoolName, programName, requiredSubjects]

    CreateProgramRequest:
      type: object
      properties:
        schoolName:
          type: string
        programName:
          type: string
        faculty:
          type: ["string", "null"]
        requiredSubjects:
          type: array
          items:
            type: string
        minRequiredSubjects:
          type: ["integer", "null"]
          description: Minimum number of required subjects needed (e.g. 2 = at least 2 of the listed). Null = all required.
        minimumPoints:
          type: ["integer", "null"]
        minOLevelPasses:
          type: ["integer", "null"]
          description: Minimum O-Level passes (default 5)
        minALevelPasses:
          type: ["integer", "null"]
          description: Minimum A-Level passes (default 2)
        duration:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        careerCategory:
          type: ["string", "null"]
      required: [schoolName, programName, requiredSubjects]

    ProgramMatchRequest:
      type: object
      properties:
        subjects:
          type: array
          items:
            type: string
        cutOffPoints:
          type: ["integer", "null"]
        oLevelPasses:
          type: ["integer", "null"]
          description: Number of O-Level passes (minimum 5)
        aLevelPasses:
          type: ["integer", "null"]
          description: Number of A-Level passes (minimum 2)
        careerCategory:
          type: ["string", "null"]
      required: [subjects]

    ProgramMatch:
      type: object
      properties:
        program:
          $ref: "#/components/schemas/UniversityProgram"
        qualifies:
          type: boolean
          description: Whether the student fully qualifies
        missingSubjects:
          type: array
          items:
            type: string
          description: Subjects the student is missing
        meetsPointsRequirement:
          type: ["boolean", "null"]
          description: Whether student meets the cut-off points (null if no points provided or required)
        meetsOLevelRequirement:
          type: ["boolean", "null"]
          description: Whether student meets O-Level pass requirement
        meetsALevelRequirement:
          type: ["boolean", "null"]
          description: Whether student meets A-Level pass requirement
        pointsChance:
          type: ["string", "null"]
          enum: [high, equal, low]
          description: With user's points - high/equal/low chance to enroll (informational only, does not affect qualification)
      required: [program, qualifies, missingSubjects]

    UploadProgramsRequest:
      type: object
      properties:
        programs:
          type: array
          items:
            $ref: "#/components/schemas/CreateProgramRequest"
          description: Array of programs to import (from JSON or parsed CSV)
        replace:
          type: boolean
          description: If true, replace all existing programs
      required: [programs]

    UploadProgramsResponse:
      type: object
      properties:
        imported:
          type: integer
        skipped:
          type: integer
        message:
          type: string
      required: [imported, skipped, message]

    CareerInsights:
      type: object
      properties:
        career:
          type: string
        demandLevel:
          type: string
          enum: [High, Medium, Low]
        jobCount:
          type: integer
        topSkills:
          type: array
          items:
            type: string
        averageSalary:
          type: ["string", "null"]
      required: [career, demandLevel, jobCount, topSkills]

    JobListing:
      type: object
      properties:
        title:
          type: string
        company:
          type: string
        location:
          type: string
        salary:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        url:
          type: ["string", "null"]
          description: Link to the job advert
      required: [title, company, location]

    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required: [role, content]

    ChatRequest:
      type: object
      properties:
        message:
          type: string
        history:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        studentProfile:
          $ref: "#/components/schemas/StudentProfile"
      required: [message]

    ChatResponse:
      type: object
      properties:
        message:
          type: string
        suggestions:
          type: array
          items:
            type: string
      required: [message, suggestions]

    FeedbackRequest:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: ["string", "null"]
        careerName:
          type: ["string", "null"]
        helpful:
          type: boolean
      required: [rating, helpful]

    FeedbackResponse:
      type: object
      properties:
        id:
          type: integer
        message:
          type: string
      required: [id, message]
